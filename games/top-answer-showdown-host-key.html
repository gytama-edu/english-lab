<!DOCTYPE html>

                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M12 2v2"></path>
                            <path d="M12 20v2"></path>

            <div class="state-message" style="text-align: center; padding: 4rem 1rem;">

    <script src="../script.js"></script>
